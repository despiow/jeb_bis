name: Vérification & Déploiement

on:
  push:
    branches:
      - main

jobs:
  verify:
    name: Vérification du code
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification syntaxe JavaScript
        run: |
          echo "→ Vérification JS..."
          node --check js/main.js
          echo "✓ JS valide"

      - name: Vérification fichiers obligatoires
        run: |
          echo "→ Vérification des fichiers clés..."
          test -f index.html    || (echo "✗ index.html manquant"  && exit 1)
          test -f css/style.css || (echo "✗ style.css manquant"   && exit 1)
          test -f js/main.js    || (echo "✗ main.js manquant"     && exit 1)
          echo "✓ Fichiers présents"

      - name: Vérification HTML basique
        run: |
          echo "→ Vérification HTML..."
          grep -q "<!DOCTYPE html>" index.html || (echo "✗ DOCTYPE manquant"       && exit 1)
          grep -q "</html>"         index.html || (echo "✗ Balise </html> manquante" && exit 1)
          grep -q "css/style.css"   index.html || (echo "✗ Lien CSS manquant"      && exit 1)
          grep -q "js/main.js"      index.html || (echo "✗ Lien JS manquant"       && exit 1)
          echo "✓ HTML valide"

  deploy:
    name: Déploiement sur la VM
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Mise en place de la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Git pull sur la VM + fix permissions
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            echo "→ Mise à jour des fichiers..."
            cd /var/www/JEB
            git pull origin main
            chown -R 33:33 /var/www/JEB
            chmod -R 755 /var/www/JEB
            echo "✓ Fichiers mis à jour"
          EOF

      - name: Redémarrage via webhook Portainer
        run: |
          echo "→ Redémarrage du container..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Code réponse : $RESPONSE"
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✓ Container redémarré"
          else
            echo "✗ Erreur webhook (code $RESPONSE)"
            exit 1
          fi
