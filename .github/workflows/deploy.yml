name: Vérification & Déploiement

on:
  push:
    branches:
      - main

jobs:
  verify:
    name: Vérification du code
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification syntaxe JavaScript
        run: |
          node --check js/main.js
          echo "✓ JS valide"

      - name: Vérification fichiers obligatoires
        run: |
          test -f index.html    || (echo "✗ index.html manquant"  && exit 1)
          test -f css/style.css || (echo "✗ style.css manquant"   && exit 1)
          test -f js/main.js    || (echo "✗ main.js manquant"     && exit 1)
          echo "✓ Fichiers présents"

      - name: Vérification HTML basique
        run: |
          grep -q "<!DOCTYPE html>" index.html || (echo "✗ DOCTYPE manquant"        && exit 1)
          grep -q "</html>"         index.html || (echo "✗ Balise </html> manquante" && exit 1)
          echo "✓ HTML valide"

  build-and-deploy:
    name: Build image & Déploiement
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion au registry GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Déclenchement du webhook Portainer
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✓ Déploiement déclenché (code $RESPONSE)"
          else
            echo "✗ Erreur webhook (code $RESPONSE)"
            exit 1
          fi
